function detectFormat(u) {
  u = (u || "").toLowerCase();
  if (u.includes("anthropic")) return "anthropic";
  if (u.includes("generativelanguage") || u.includes("googleapis")) return "gemini";
  return "openai";
}
async function fetchModelList(p) {
  const base = (p.baseUrl || "").replace(/\/$/, "");
  const fmt = detectFormat(base);

    const r = await fetch(base + "/v1beta/models", {
      headers: {
        "x-goog-api-key": p.apiKey
      }
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    return (d.models || []).map(m => (m.name || "").replace("models/", "")).filter(Boolean);
  }
  if (fmt === "anthropic") {
    const r = await fetch(base + "/v1/models", {
      headers: {
        "x-api-key": p.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      }
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    return (d.data || []).map(m => m.id);
  }
  const root = base.endsWith("/v1") ? base : base + "/v1";
  const r = await fetch(root + "/models", {
    headers: {
      Authorization: "Bearer " + p.apiKey

  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return (d.data || []).map(m => m.id).sort();
}
async function callAI(p, system, messages, opts) {

  const temp = typeof p.temperature === "number" ? p.temperature : 0.75;
  const maxTokens = opts.maxTokens || 1600;

  if (!model) throw new Error("尚未指定模型");

    const r = await fetch(base + "/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": p.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model,
        max_tokens: maxTokens,
        temperature: temp,
        system,
        messages
      })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    const t = (d.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim();
    if (!t) throw new Error("模型返回为空");
    return t;
  }
  if (fmt === "gemini") {
    const r = await fetch(base + "/v1beta/models/" + model + ":generateContent", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-goog-api-key": p.apiKey
      },
      body: JSON.stringify({
        system_instruction: {
          parts: [{
            text: system
          }]
        },
        contents: messages.map(m => ({
          role: m.role === "assistant" ? "model" : "user",
          parts: [{
            text: m.content
          }]
        })),
        generationConfig: {
          temperature: temp,
          maxOutputTokens: maxTokens
        }
      })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    const parts = d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts || [];

    return t;

  const r = await fetch(root + "/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + p.apiKey
    },
    body: JSON.stringify({
      model,
      max_tokens: maxTokens,
      temperature: temp,
      messages: [{
        role: "system",
        content: system
      }, ...messages]

}

function directedRelationLines(char, rels, chars, profile) {
  const lines = [];
  const me = profile.name || "用户";
  const a = rels[char.id + "->me"],
    b = rels["me->" + char.id];
  if (a) lines.push("- " + char.name + " 眼中的「" + me + "」：" + a.label + (a.note ? "（" + a.note + "）" : ""));
  if (b) lines.push("- 「" + me + "」眼中的 " + char.name + "：" + b.label + (b.note ? "（" + b.note + "）" : ""));
  for (const o of chars) {
    if (o.id === char.id) continue;
    const r = rels[char.id + "->" + o.id];
    if (r) lines.push("- " + char.name + " 眼中的 " + o.name + "：" + r.label + (r.note ? "（" + r.note + "）" : ""));
  }
  return lines.length ? lines.join("\n") : "（暂无已设定的关系）";
}
function buildBundle(ctx) {
  const {
    char,
    chars,
    rels,
    worldbook,
    profile,
    recentChat,
    affinity,
    memory,
    geo,
    timeAware
  } = ctx;
  const now = new Date();
  const parts = [];
  if (timeAware !== false) parts.push("【当前真实时间】" + now.toLocaleString("zh-CN", {
    year: "numeric",
    month: "long",
    day: "numeric",
    weekday: "long",
    hour: "2-digit",
    minute: "2-digit"
  }));
  if (geo && geo.label) parts.push("【用户当前位置】" + geo.label + "（角色可据此自然回应，但不要生硬报出经纬度）");
  parts.push("【角色人设】\n" + (char.persona || "（暂无设定）"));
  if (profile && (profile.name || profile.persona)) parts.push("【用户「" + (profile.name || "用户") + "」的设定】\n" + (profile.persona || "（未填写）"));
  parts.push("【" + char.name + " 的关系网（有方向）】\n" + directedRelationLines(char, rels, chars, profile));
  if (typeof affinity === "number") parts.push("【当前对用户好感度】" + affinity + " / 100");
  if (worldbook && worldbook.trim()) parts.push("【世界书】\n" + worldbook.trim());
  if (memory && memory.trim()) parts.push("【长期记忆摘要（过往对话浓缩）】\n" + memory.trim());

  const system = "把下面这段对话浓缩成第三人称的记忆摘要，抓住关键事件、情绪变化、承诺与未完成的事，简洁但不丢重要信息。已有摘要在前，请把新内容融合进去输出一份完整的新摘要。只输出摘要正文。\n\n【已有摘要】\n" + (ctx.memory || "（无）");

// 根据财务档案 + 生成日期，推算「跑动余额」：每天扣一笔日常消费，每月1号进月收入/扣固定支出
function computeLedger(w) {
  if (!w) return null;
  const pool = (w.dailyPool || []).filter(x => x && typeof x.amount === "number");
  const start = new Date((w._startDate || ymd(new Date(w._at || Date.now()))) + "T00:00:00");
  start.setHours(0, 0, 0, 0);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const dayMs = 86400000;
  const daily = [];
  let firsts = 0,
    idx = 0;
  for (let d = new Date(start); d <= today; d = new Date(d.getTime() + dayMs)) {
    if (pool.length) {
      const p = pool[idx % pool.length];
      daily.push({
        date: fmtMD(d),
        items: p.items,
        amount: p.amount,
        ts: d.getTime()
      });
    }
    if (d.getDate() === 1 && d.getTime() !== start.getTime()) firsts++;
    idx++;
  }
  const monthly = Number(w.monthlyIncome) || 0,
    fixed = Number(w.fixedMonthly) || 0;
  const spentAll = daily.reduce((a, x) => a + x.amount, 0);
  const balance = (Number(w.baseBalance) || 0) + (monthly - fixed) * firsts - spentAll;
  const thisMonth = daily.filter(x => {
    const dt = new Date(x.ts);
    return dt.getMonth() === today.getMonth() && dt.getFullYear() === today.getFullYear();
  });
  const monthSpend = fixed + thisMonth.reduce((a, x) => a + x.amount, 0);
  return {
    balance,
    monthIncome: monthly,
    monthSpend,
    remain: monthly - monthSpend,
    fixed,
    daily: daily.slice().reverse()
  };
}
