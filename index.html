<style>
  html, body, #root { height: 100vh; margin: 0; padding: 0; overscroll-behavior: none; background: #ece8e1; }
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; -webkit-touch-callout: none; }
  /* 全局禁用长按选择/拷贝菜单（输入框除外），避免长按气泡弹出 iOS 选择菜单 */
  body { -webkit-user-select: none; user-select: none; }
  input, textarea, [contenteditable] { -webkit-user-select: text; user-select: text; -webkit-touch-callout: default; }
  ::-webkit-scrollbar { display: none; }
  /* 用 100vh（=large viewport，撑到物理屏底）+ overflow hidden 固定视口。不用 fixed body / 100dvh（dvh 只撑到 WebKit 可视区，iOS PWA 会露白边）。 */
  html, body { width: 100%; height: 100vh; overflow: hidden; overscroll-behavior: none; }
  body { font-family: 'Archivo','Noto Serif SC',system-ui,sans-serif; }
  input[type="color"] { -webkit-appearance: none; appearance: none; padding: 0; border: none; background: none; }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: 1px solid #ddd; border-radius: 999px; }
  input[type="range"] { -webkit-appearance: none; appearance: none; height: 3px; background: #ddd8cd; border-radius: 3px; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 999px; background: #fff; border: 1px solid #ddd8cd; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
  input[type="range"]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 999px; background: #fff; border: 1px solid #ddd8cd; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);} }
  @keyframes wk-spin { to { transform: rotate(360deg); } }
  /* 跑马灯：文字太长时来回滚动（--mq = 负的溢出距离） */
  @keyframes wk-marquee { 0%,10% { transform: translateX(0);} 46%,54% { transform: translateX(var(--mq,0));} 90%,100% { transform: translateX(0);} }
  .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .leaflet-container { font-family: 'Archivo','Noto Serif SC',system-ui,sans-serif; background: #dfe6ea; }
  .cm-tip { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 8px; }

<script>
  // 注册 Service Worker（锁屏通知用）；点通知回来时通知 app 打开对应聊天
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("./sw.js").catch(function (e) { console.warn("SW 注册失败", e); });
      navigator.serviceWorker.addEventListener("message", function (e) {
        if (e.data && e.data.type === "OPEN_FROM_NOTIF" && window.__openFromNotif) window.__openFromNotif(e.data.charId, e.data.screen);
      });
    });
  }
